version: '3.8'

networks:
  hr_network:
    driver: bridge

volumes:
  pgdata:

services:
  db:
    image: postgres:15-alpine
    container_name: hr_database
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: hr_analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - hr_network

  data_load:
    build: ./data_load
    container_name: hr_data_load
    depends_on:
      - db
    volumes:
      - ./data:/data
    networks:
      - hr_network

  data_quality_analysis:
    build: ./data_quality_analysis
    container_name: hr_quality
    depends_on:
      - db
    volumes:
      - ./reports:/reports
    networks:
      - hr_network

  data_research:
    build: ./data_research
    container_name: hr_research
    depends_on:
      - db
    volumes:
      - ./reports:/reports
    networks:
      - hr_network

  visualization:
    build: ./visualization
    container_name: hr_visualization
    depends_on:
      - db
    volumes:
      - ./plots:/plots
    networks:
      - hr_network

  web:
    build: ./web
    container_name: hr_web
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./reports:/reports
      - ./plots:/plots
    networks:
      - hr_network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - hr_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - hr_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - hr_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - hr_network
