name: Self-Hosted Runner CI

on:
  workflow_dispatch:

jobs:
  run-on-my-pc:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Data Load
        shell: cmd
        run: |
          echo "Цей код виконується прямо на моєму комп'ютері!"
          python src/data_load.py
